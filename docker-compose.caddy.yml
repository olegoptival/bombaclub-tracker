services:
  caddy:
    image: caddy:2-alpine
    container_name: poker_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # network_mode: host пока не нужен — Caddy общается с другими сервисами
    # через docker network на Этапе 5
    
volumes:
  caddy_data:
  caddy_config:
